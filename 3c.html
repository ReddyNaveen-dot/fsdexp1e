<!DOCTYPE html>
<html>
<head>
	<title>Sementic HTML with CSS</title>
	<style>
		body
		{
			font-family:Arial,sans-serif ;
			nargin:0;
			padding: 0;
			background-color:#f4f4f4;
		}
		header
		{
			background-color:#333;
			color:white;
			padding:20px;
			text-align:center;
		}
		header hav ul li a
		{
			color:white;
			text-decoration:none;
			font-weight:bold;
		}
		main
		{
			padding:20px;
		}
		section
		{
			background-color:white;
			padding: 20px;
			margin-bottom:20px;
			border-radius:8px;
			box-shadow:02px 4px rgba(0, 0, 0, 0.1);
		}
		section h2
		{
			color:#333;
		}
		footer
		{
			text-align:center;
			padding:10px;
			background-color:#333;
			color: white;
			position: fixed;
			width: 100%;
			bottom: 0;
		}
	</style>
</head>
<body>
	<header>
		<h1>Welcome to my website</h1>
		<nav>
			<ul>
				<li> <a href="#Home">Home</li>
				<li><a href="#about">About</li>
				<li><a href="#service">service</li>
				<li><a href="#contat">contact</li>
			</ul>
		</nav>
	</header>
	<main>
		<section id="Home">
			<h2>Home</h2>
			<p>This is the home section of the website</p>
		</section>
		<section id="About">
			<h2>About Us</h2>
			<p>Learn more about what we offer</p>
		</section>
		<section id="services">
			<h2>Our service</h2>
			<p>Explore the service with us</p>
		</section>
		<section id="contact">
		<h2>Contact Us</h2>
		<p>Get In Touch With Us</p>			
		</section>
	</main>
	<footer>
		<p>&copy; 2025 my website, all right reserved</p>
	</footer>
</body>
</html>
